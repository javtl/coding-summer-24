<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lateral Nav Bar</title>
    <!-- Enlaces a recursos externos -->
    <link rel="icon" href="img/icons8-orthogonal-view-96.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navegación lateral -->
    <nav>
        <!-- Encabezado -->
        <header>
            <!-- Barra superior -->
            <div class="bar"></div>
            <!-- Información del usuario -->
            <div class="user">
                <img src="img/user-profile-photo.png" alt="">
                <div class="name">
                   <a href="https://www.linkedin.com/in/javierlge/" target="_blank">Profile Name</a> 
                </div>
            </div>
        </header>

        <!-- Enlaces de navegación -->
        <div class="links">
            <!-- Enlace HTML -->
            <a href="#">
                <div class="icon">
                    <span>
                        <img src="img/1-icons8-html-5-48.png" alt="">
                    </span>
                </div>
                <div class="title"> 
                    <a href="https://es.wikipedia.org/wiki/HTML" target="_blank">HTML</a>
                </div>
            </a>

            <!-- Enlace CSS -->
            <a href="#">
                <div class="icon">
                    <span>
                        <img src="img/2-icons8-css3-48.png" alt="">
                    </span>
                </div>
                <div class="title" >
                    <a href="https://es.wikipedia.org/wiki/CSS" target="_blank">CSS</a>
                </div>
            </a>

            <!-- Enlace JavaScript -->
            <a href="#">
                <div class="icon">
                    <span>
                        <img src="img/3-icons8-javascript-48.png" alt="">
                    </span>
                </div>
                <div class="title">
                    <a href="https://es.wikipedia.org/wiki/JavaScript" target="_blank">JavaScript</a>
                </div>
            </a>

             <!-- Enlace React.JS -->
                <a href="#">
                        <div class="icon">
                             <span>
                                <img src="img/icons8-react-40.png" alt="">
                            </span>
                        </div>
                    <div class="title">
                        <a href="https://es.wikipedia.org/wiki/React" target="_blank">React</a>
                    </div>
                </a>

                <!-- Enlace Node.JS -->
            <a href="#">
                <div class="icon">
                    <span>
                        <img src="img/4-icons8-node-js-48.png" alt="">
                    </span>
                </div>
                <div class="title">
                    <a href="https://es.wikipedia.org/wiki/Node.js" target="_blank">Node</a>
                </div>
            </a>
            </div>

            
        

    </nav>
</body>
</html>
