<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Configuración básica del documento -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Sidebar 01</title>
    <!-- Icono de la pestaña del navegador -->
    <link rel="icon" href="icons8-css-32.png">
    <!-- Hoja de estilos externa para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.2/css/all.css">
    <!-- Hoja de estilos personalizada -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Encabezado de la página -->
    <header>
        <!-- Icono para abrir el menú de navegación -->
        <div class="hamburger">
            <i class="fas fa-bars"></i>
        </div>
        <!-- Menú de navegación -->
        <nav class="nav">
            <ul class="nav-list">
                <!-- Elementos del menú -->
                <li class="nav-item">
                    <a class="nav-link current" href="#">
                        <span><i class="fas fa-home"></i></span> Home
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">
                        <span><i class="fas fa-address-card"></i></span> About
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">
                        <span><i class="fas fa-briefcase"></i></span> Portfolio
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">
                        <span><i class="fas fa-blog"></i></span> Blog
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">
                        <span><i class="fas fa-envelope"></i></span> Contact
                    </a>
                </li>
            </ul>
        </nav>
    </header>
    <!-- Contenido principal de la página -->
    <main>
        <div class="zoom">
            <!-- Simulación del contenido principal -->
            <section></section>
            <!-- Fin de la simulación del contenido principal -->
        </div>
    </main>
    <!-- Archivo JavaScript para la funcionalidad -->
    <script src="script.js"></script>
</body>
</html>
