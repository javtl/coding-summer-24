<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuadro Confirmación</title>
    <link rel="icon" href="img/check-icon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Contenedor del modal -->
    <div class="modal-container">
        <!-- Modal de confirmación -->
        <div class="modal">
            <!-- Contenido del modal -->
            <div class="content">
                <!-- Icono -->
                <div class="icon">
                    <img src="img/check-icon.png" alt="">
                </div>
                <!-- Mensaje -->
                <div class="message">
                    <!-- Título del mensaje -->
                    <div class="title">
                        <h3>Titulo Recuadro</h3>
                    </div>
                    <!-- Texto del mensaje -->
                    <div class="text">Texto de confirmación recuadro</div>
                </div>
            </div>
            <!-- Acciones en el modal -->
            <div class="actions">
                <!-- Botón de confirmación -->
                <button class="btn-confirm">Crear Elemento</button>
                <!-- Botón de cancelación -->
                <button class="btn-cancel">Cancel</button>
            </div>
        </div>
    </div>
</body>
</html>
