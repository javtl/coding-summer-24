<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablas</title>
    <!-- Enlace al archivo de estilos externo -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Definición de una tabla -->
    <table>
        <!-- Título de la tabla -->
        <caption>
            Tabla
        </caption>

        <!-- Encabezado de la tabla -->
        <thead>
            <tr>
                <!-- Celdas de encabezado -->
                <th>titulo</th>
                <th>titulo</th>
                <th>titulo</th>
                <th>titulo</th>
                <th>titulo</th>
                <th>titulo</th>
            </tr>
        </thead>

        <!-- Cuerpo de la tabla -->
        <tbody>
            <!-- Fila de datos -->
            <tr>
                <!-- Celdas de datos -->
                <td>texto</td>
                <td>texto</td>
                <td>texto</td>
                <td>texto</td>
                <td>texto</td>
                <td>texto</td>
            </tr>

            <!-- Otras filas de datos -->
            <tr>
                <td>texto</td>
                <td>texto</td>
                <td>texto</td>
                <td>texto</td>
                <td>texto</td>
                <td>texto</td>
            </tr>

            <tr>
                <td>texto</td>
                <td>texto</td>
                <td>texto</td>
                <td>texto</td>
                <td>texto</td>
                <td>texto</td>
            </tr>

            <tr>
                <td>texto</td>
                <td>texto</td>
                <td>texto</td>
                <td>texto</td>
                <td>texto</td>
                <td>texto</td>
            </tr>
        </tbody>

        <!-- Pie de la tabla -->
        <tfoot>
            <tr>
                <th></th>
                <th></th>
                <!-- Celdas de resumen -->
                <th>texto</th>
                <th>texto</th>
                <th>texto</th>
                <th>texto</th>
            </tr>
        </tfoot>
    </table>
</body>
</html>
