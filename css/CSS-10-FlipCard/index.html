<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip Cards</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Contenedor principal para las tarjetas -->
    <div class="cards">
        <!-- Tarjeta 1 -->
        <div class="flip-card-1">
            <div class="flip-card">
                <div class="flip-card-inner">
                    <!-- Frente de la tarjeta 1 -->
                    <div class="flip-card-front">
                        <img src="img/lambo.jpg" alt="">
                    </div>
                    <!-- Dorso de la tarjeta 1 -->
                    <div class="flip-card-back">
                        <h3>Lamborghini</h3>
                        <p>Lamborghini Huracán</p>
                        <p>Es un automóvil deportivo de alto rendimiento...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tarjeta 2 -->
        <div class="flip-card-2">
            <div class="flip-card">
                <div class="flip-card-inner">
                    <!-- Frente de la tarjeta 2 -->
                    <div class="flip-card-front">
                        <img src="img/mclaren.jpg" alt="">
                    </div>
                    <!-- Dorso de la tarjeta 2 -->
                    <div class="flip-card-back">
                        <h3>McLaren</h3>
                        <p>McLaren 720S</p>
                        <p>Es un automóvil superdeportivo biplaza...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tarjeta 3 -->
        <div class="flip-card-3">
            <div class="flip-card">
                <div class="flip-card-inner">
                    <!-- Frente de la tarjeta 3 -->
                    <div class="flip-card-front">
                        <img src="img/bugatti.jpg" alt="">
                    </div>
                    <!-- Dorso de la tarjeta 3 -->
                    <div class="flip-card-back">
                        <h3>Bugatti</h3>
                        <p>Bugatti Chiron</p>
                        <p>Es un automóvil superdeportivo cupé de dos...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
