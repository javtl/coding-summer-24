<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Enlace a la fuente de iconos Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- Icono de la pestaña del navegador -->
    <link rel="icon" href="/img/comment-icon.png" type="image/png">
    <!-- Enlace al archivo de estilos externo -->
    <link rel="stylesheet" href="styles.css">
    <title>Comentarios</title>
</head>
<body>
<!-- Contenedor de comentarios -->
<div class="comments-container">

  <!-- Comentario principal -->
  <div class="comment">
      <div class="comment-wrapper">
          <div class="content">
              <div class="user-photo">
                  <img src="/img/user-default-picture.png" alt="" width="50" />
              </div>
              <div class="comment-info">
                  <div class="header">
                      <span class="username">@username</span>
                      <span class="date">5hrs ago</span>
                  </div>
                  <div class="text">Este es un comentario</div>
                  <div class="actions">
                      <button>Like</button>
                      <button>Reply</button>
                      <button>Share</button>
                      <button>Follow</button>
                      <button>Report</button>
                  </div>
              </div>
          </div>
          <div class="replies">

              <!-- Comentario anidado -->
              <div class="comment">
                  <div class="line"></div>
                  <div class="comment-wrapper">
                      <div class="content">
                          <div class="user-photo">
                              <img src="/img/user-default-picture.png" alt="" width="50" />
                          </div>
                          <div class="comment-info">
                              <div class="header">
                                  <span class="username">@username</span>
                                  <span class="date">5hrs ago</span>
                              </div>
                              <div class="text">Este es un comentario</div>
                              <div class="actions">
                                  <button>Like</button>
                                  <button>Reply</button>
                                  <button>Share</button>
                                  <button>Follow</button>
                                  <button>Report</button>
                              </div>
                          </div>
                      </div>
                  </div>
              </div>
              <!-- Fin de comentario anidado -->

              <!-- Repetición de comentarios anidados -->

          </div>
      </div>
  </div>
  <!-- Fin de comentario principal -->

  <!-- Repetición de comentarios principales -->

</div>
<!-- Fin de contenedor de comentarios -->

</body>
</html>
