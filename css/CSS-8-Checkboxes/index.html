<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Enlace a la fuente de iconos de Material Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    
    <!-- Título de la página -->
    <title>Checkboxes</title>
    
    <!-- Enlace al archivo de estilos CSS personalizado -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Etiqueta para un contenedor de checkbox -->
    <label class="checkbox-container">
        checkbox <!-- Texto que describe el propósito del checkbox -->
        
        <!-- Input de tipo checkbox -->
        <input type="checkbox" name="" id=""/>
        
        <!-- Contenedor visual para la apariencia de la marca de verificación -->
        <span class="checkmark">
            <!-- Icono de marca de verificación de Material Icons -->
            <span class="material-icons">check</span>
        </span>
    </label>
</body>
</html>
