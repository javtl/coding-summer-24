<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campana animada</title>
    
    <!-- Enlace a la fuente de íconos Material Icons de Google Fonts -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    
    <!-- Enlace al archivo de estilos externo "styles.css" -->
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <!-- Contenedor de notificación -->
    <div class="notification">
        <!-- Contenedor para el contador de notificaciones -->
        <div class="count">1</div>
        
        <!-- Ícono de campana usando Material Icons -->
        <span class="material-icons">notifications</span>
    </div>
</body>
</html>
