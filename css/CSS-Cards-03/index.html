<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cards</title>
    <!-- Favicon -->
    <link rel="icon" href="img/icons8-css-32.png">
    
    <!-- Link to remixicon cdn for icons -->
    <link
        href="https://cdn.jsdelivr.net/npm/remixicon@3.2.0/fonts/remixicon.css"
        rel="stylesheet"
    />
    
    <!-- Link to your custom stylesheet -->
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <!-- Product Card Container -->
    <figure class="product-card">
        <!-- Product Image -->
        <img src="img/product.png" alt="Face mask" class="product-card__image" />
        
        <!-- Product Caption -->
        <figcaption class="product-card-caption">
            <!-- Product Header -->
            <header class="product-card-header">
                <h2 class="product-card-title">Face mask</h2>
                <p class="product-card-subtitle">Charcoal</p>
            </header>
            
            <!-- Product Footer -->
            <footer class="product-card-footer">
                <span class="product-card-price">$19.99</span>
                <!-- Add to Cart Button -->
                <button class="product-card-button">
                    <i class="product-card-icon ri-add-line"></i>
                </button>
            </footer>
        </figcaption>
    </figure>
</body>
</html>
