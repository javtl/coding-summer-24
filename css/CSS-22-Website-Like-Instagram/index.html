<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Desktop</title>
    <link rel="icon" href="img/icon-instagram-96-line-purple.png">
    <link rel="stylesheet" href="styles.css">

    <!-- Agregado el enlace para cargar fuentes desde un CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css">

<body>
    <!-- Barra lateral izquierda -->
    <div class="sidebar">
        <a href="" class="logo">
            <img src="img/instagram-logo-name.png" alt="">
        </a>

        <!-- Perfil del usuario -->
        <div class="profile">
            <div class="profile-img">
                <img src="/img/blank-profile-picture-973460_1280.png" alt="">
            </div>
            <div class="name">
                <h1>user-name</h1>
            </div>
            <span>@username</span>
        </div>
        
        <!-- Información sobre el perfil -->
        <div class="about">
            <div class="box">
                <h3>14</h3>
                <span>post</span>
            </div>
            <div class="box">
                <h3>100.1M</h3>
                <span>Followers</span>
            </div>
            <div class="box">
                <h3>99</h3>
                <span>following</span>
            </div>
        </div>
        
        <!-- Menú de navegación -->
        <div class="menu">
            <!-- Enlaces del menú -->
            <!-- Usa "active" para resaltar la página actual -->
            <a href="#" class="active">
                <span class="icon">
                    <img src="/img/icons8-app-67.png" alt="">
                </span>
                Feed
            </a>
            <a href="#">
                <span class="icon">
                    <img src="img/icons8-search-50.png" alt="">
                </span>
                Explore
            </a>
            <a href="#">
                <span class="icon">
                    <img src="img/icons8-bell-48.png" alt="">
                </span>
                Notifications
            </a>
            <a href="#">
                <span class="icon">
                    <img src="img/icons8-message-48.png" alt="">
                </span>
                Messages
            </a>
            <a href="#">
                <span class="icon">
                    <img src="img/icons8-arrow-50.png" alt="">
                </span>
                Direct
            </a>
            <a href="#">
                <span class="icon">
                    <img src="img/icons8-stats-48.png" alt="">
                </span>
                Stats
            </a>
            <a href="#">
                <span class="icon">
                    <img src="img/icons8-setting-30.png" alt="">
                </span>
                Settings
            </a>
            <a href="#">
                <span class="icon">
                    <img src="img/icons8-logout-60.png" alt="">
                </span>
                Logout
            </a>
        </div>
    </div>

    <!-- Contenido principal -->
    <div class="main-home">
        <div class="header">
            <!-- Barra de búsqueda -->
            <div class="search">
                <img src="/img/icons8-search-50.png" alt="">
                <input type="text" placeholder="Search">
            </div>

            <!-- Botones de la cabecera -->
            <div class="header-content">
                <a href="" class="btn">
                    <img src="img/icons8-bell-48.png" alt="">
                </a>
                <a href="" class="btn">
                    <img src="img/icons8-message-48.png" alt="">  
                </a>
                <a href="" class="btn">
                    <img src="img/icons8-add-50.png" alt="">
                    <div class="btn-text"></div>
                </a>
            </div>
        </div>
        
        <!-- Título de las historias -->
        <div class="stories-title">

                                <img src="/img/blank-profile-picture-973460_1280.png" alt="User 6">
                           </div>

            </div>
        </div>

        <!-- Título de la sección de Feed -->
        <h3>Feed</h3>

        <div class="post">
            <div class="post-content">
                <img src="/img/artem-balashevsky-He4USl6NWdo-unsplash.jpg" alt="Post 1">
            </div>
            <div class="user-actions">
                <!-- Botones de acción en la publicación -->
                <!-- Botón "Me gusta" -->
                <button class="like-button">
                    <img src="/img/icons8-heart-50.png" alt="Me Gusta">
                </button>
                <!-- Botón "Mensaje" -->
                <button class="message-button">
                    <img src="img/icons8-message-48.png" alt="Mensaje">
                </button>
            </div>
            <div class="post-user">
                <!-- Imagen de perfil pequeña del usuario -->
