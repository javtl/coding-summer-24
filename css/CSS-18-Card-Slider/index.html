<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Slider</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="img/icons8-slide-60.png">
</head>
<body>
    <!-- Contenedor principal -->
    <div class="container">

        <!-- Contenedor del slider -->
        <div class="slider-container">
            <!-- Viewport del slider -->
            <div class="slider-viewport">
                <!-- Slide 1 -->
                <div class="slide" id="slide1">
                    <img src="img/1-arthur-hinton-wL8ERN-lKgE-unsplash.jpg" alt="">
                </div>
                <!-- Slide 2 -->
                <div class="slide" id="slide2">
                    <img src="img/2-oliver-schmid-mfBvuEcdiKU-unsplash.jpg" alt="">
                </div>
                <!-- Slide 3 -->
                <div class="slide" id="slide3">
                    <img src="img/3-neom-0SUho_B0nus-unsplash.jpg" alt="">
                </div>
                <!-- Slide 4 -->
                <div class="slide" id="slide4">
                    <img src="img/4-neom-Iy59i0M7oP4-unsplash.jpg" alt="">
                </div>
                <!-- Slide 5 -->
                <div class="slide" id="slide5">
                    <img src="img/5-yuri-krupenin-iK0ODqrNlvE-unsplash.jpg" alt="">
                </div>
            </div>

            <!-- Enlaces para navegar por los slides -->
            <div class="links">
                <a href="#slide1">1</a>
                <a href="#slide2">2</a>
                <a href="#slide3">3</a>
                <a href="#slide4">4</a>
                <a href="#slide5">5</a>
            </div>

        </div>
    </div>
</body>
</html>
