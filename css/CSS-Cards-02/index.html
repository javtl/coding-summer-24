<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card Article</title>
    <!-- Enlace al icono de la pestaña del navegador -->
    <link rel="icon" href="img/icons8-css-32.png">
    <!-- Enlace a la fuente RemixIcon -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet" />
    <!-- Enlace a la hoja de estilos externa -->
    <link rel="stylesheet" href="./styles.css" />
</head>
<body>
    <!-- Contenedor principal -->
    <div class="container">
        <!-- Artículo de la tarjeta -->
        <article class="card">
            <!-- Sección de la publicación de la tarjeta -->
            <div class="card-publication">
                <!-- Imagen de la publicación -->
                <img src="img/post__image.jpg" alt="" />
                <div>
                    <!-- Nombre del autor con ícono -->
                    <span class="card-author">
                        <i class="ri-user-line card-icon"></i> @user-name
                    </span>
                    <!-- Fecha de la publicación con ícono -->
                    <span class="card-date">
                        <i class="ri-calendar-line card-icon"></i> 04/24/2023
                    </span>
                </div>
            </div>
            <!-- Información de la tarjeta -->
            <div class="card-info">
                <!-- Título de la tarjeta -->
                <h2 class="card-title">Card <Title></Title></h2>
                <!-- Subtítulo de la tarjeta -->
                <span class="card-subtitle">Card subtitle</span>
                <!-- Descripción de la tarjeta -->
                <p class="card-description">
                    Lorem ipsum dolor sit amet, consectetur adipisicing elit. Ad aliquam
                    aliquid asperiores corporis earum et, laborum maxime molestias non
                    odit omnis, praesentium. Et hic molestiae odio repellat, rerum sint
                    vitae?
                </p>
                <!-- Enlace de "Leer más" -->
                <a href="#" class="card-cta"> Read more <span>&rarr;</span> </a>
            </div>
        </article>
    </div>
</body>
</html>
