<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notificación</title>
  <!-- Enlace a la fuente de iconos de Google Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <!-- Enlace a la hoja de estilos personalizada -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Contenedor principal del formulario -->
  <div class="form-container">
    <div class="login-container">
      <!-- Encabezado -->
      <h2>welcome</h2>
      <!-- Párrafo descriptivo -->
      <p>elige una de las opciones de registro o inicio de sesión</p>
      
      <!-- Formulario de inicio de sesión -->
      <form action="">
        <p>
          <!-- Etiqueta y campo para el nombre de usuario -->
          <label for="username">Username</label>
          <input class="input" type="text" name="username">
        </p>
        <p>
          <!-- Etiqueta y campo para la contraseña -->
          <label for="password">Password</label>
          <input type="password" name="password">
        </p>

        <!-- Opciones y enlaces adicionales -->
        <div class="options">
          <div>
            <!-- Casilla de verificación "Recuérdame" -->
            Remember me <input type="checkbox" name="remeberme" id="">
          </div>
          <div>
            <!-- Enlace "Olvidé mi contraseña" -->
            <a href="#">Olvide mi contraseña</a>
          </div>
        </div>

        <p>
          <!-- Botón para iniciar sesión -->
          <input class="btn btn-login" type="submit" value="Iniciar sesión" />
        </p>

        <!-- Botones de proveedores de inicio de sesión -->
        <div class="providers">
          <span>Otros métodos para hacer login</span>
          <button class="btn google-provider">Google</button>
          <button class="btn facebook-provider">Facebook</button>
          <button class="btn twitter-provider">Twitter</button>
        </div>
      </form>
    </div>
    <!-- Contenedor para una posible pantalla de bienvenida -->
    <div class="welcome-screen-container"></div>
  </div>
</body>
</html>
