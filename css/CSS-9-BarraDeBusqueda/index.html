<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Metadatos del documento -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barra de Búsqueda</title>
    
    <!-- Enlace a la fuente de iconos de Material Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    
    <!-- Enlace a la hoja de estilos personalizada -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Contenedor principal de la barra de búsqueda -->
    <div class="search-bar">
        <!-- Campo de entrada de texto -->
        <input type="text"/>
        
        <!-- Contenedor de acciones (botones) -->
        <div class="actions">
            <!-- Botón con ícono de micrófono -->
            <button>
                <span class="material-icons">mic</span>
            </button>
            
            <!-- Botón con ícono de escáner de documentos -->
            <button>
                <span class="material-icons">document_scanner</span>
            </button>

            <!-- Botón con ícono de búsqueda -->
            <button>
                <span class="material-icons">search</span>
            </button>
        </div>
    </div>
</body>
</html>
