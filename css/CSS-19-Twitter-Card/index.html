<!DOCTYPE html> <!-- Declaración del tipo de documento HTML -->
<html lang="en"> <!-- Elemento HTML principal con atributo lang para el idioma -->

<head>
    <meta charset="UTF-8"> <!-- Configuración de la codificación de caracteres -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Configuración de la escala inicial en dispositivos móviles -->
    <title>Twitter Card</title> <!-- Título de la página -->
    <link rel="stylesheet" href="styles.css"> <!-- Enlace a una hoja de estilos externa -->
    <link rel="icon" href="img/icon-twitter-50px.png"> <!-- Icono de la pestaña del navegador -->
</head>

<body>
    <!-- Contenido principal de la página -->
    <div class="profile-container">
        <div class="profile">
            <!-- Perfil de usuario -->
            <img src="img/username.png" alt="" /> <!-- Imagen de perfil -->

            <div class="info">
                <!-- Información del perfil -->
                <div class="header">
                    <!-- Encabezado del perfil -->
                    <div class="photo">
                        <img src="img/username.png" alt="" /> <!-- Imagen de perfil en el encabezado -->
                    </div>
                    <div class="action">
                        <button>Follow</button> <!-- Botón para seguir al usuario -->
                    </div>
                </div>

                <div class="user-info">
                    <!-- Información del usuario -->
                    <div class="name"><a href="#">Username</a></div> <!-- Nombre de usuario con enlace -->
                    <div class="username">@Username</div> <!-- Nombre de usuario con "@" -->
                </div>

                <div class="description">
                    description <!-- Descripción del usuario -->
                </div>

                <div class="followers-container">
                    <!-- Contenedor de seguidores -->
                    <div class="following">
                        <a href="#"> <span class="number">100</span> Siguiendo </a> <!-- Número de usuarios seguidos -->
                    </div>
                    <div class="followers">
                        <a href="#"> <span class="number">100k</span> Seguidores </a> <!-- Número de seguidores -->
                    </div>
                </div>

                <div class="other">
                    <!-- Otra información relacionada -->
                    <a href="#">
                        <div class="photos">
                            <!-- Imágenes adicionales -->
                            <img src="img/username.png" alt="">
                            <img src="img/username.png" alt="">
                            <img src="img/username.png" alt="">
                        </div>
                        <div class="names">
                            Username1, Username2 y 7 más de las cuentas que sigues siguen a esta cuenta
                            <!-- Información sobre usuarios relacionados -->
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
