<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Configuración básica de la página -->
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teclado virtual</title>

    <!-- Enlace a la hoja de estilos externa -->
    <link rel="stylesheet" href="styles.css">

    <!-- Icono de la página en la pestaña del navegador -->
    <link rel="icon" href="img/icons8-keyboard-94.png">
</head>
<body>
    <!-- Contenedor principal de la aplicación -->
    <div id="app">
        <!-- Campo de entrada de texto -->
        <input type="text" class="input">

        <!-- Contenedor para el teclado virtual (se generará dinámicamente) -->
        <div id="keyboard-container"></div>
    </div>

    <!-- Inclusión del archivo JavaScript externo -->
    <script src="script.js"></script>
</body>
</html>
