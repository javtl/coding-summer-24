<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">

        <h1>Simple Quiz</h1>
        <div class="quiz">
            <h2 id="question">Question goes here</h2>
            <div class="answer-button">
                <button class="btn" onclick="checkAnswer(0)">Option 1</button>
                <button class="btn" onclick="checkAnswer(1)">Option 2</button>
                <button class="btn" onclick="checkAnswer(2)">Option 3</button>
                <button class="btn" onclick="checkAnswer(3)">Option 4</button>
            </div>

            <button id="next-btn" onclick="nextQuestion()">Next</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
