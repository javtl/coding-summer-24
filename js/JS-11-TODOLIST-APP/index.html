<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Enlaces a hojas de estilo CSS -->
    <link rel="stylesheet" href="styles.css">
    <!-- Icono de la pestaña del navegador -->
    <link rel="icon" href="/img/icons8-add-properties-96.png">
</head>
<body>
    <!-- Contenedor principal de la página -->
    <section class="container">
        <!-- Encabezado de la página -->
        <div class="heading">
            <!-- Imagen en el encabezado (debe incluir una ruta src) -->
            <img class="heading-img" src="" alt="">
            <!-- Título principal de la página -->
            <h1 class="heading-title">To-Do List</h1>
        </div>
        <!-- Formulario para agregar tareas -->
        <form class="form">
            <div>
                <!-- Etiqueta del campo de entrada (para accesibilidad) -->
                <label class="form-label" for="todo">
                    <!-- Texto de la etiqueta (debe añadirse aquí) -->
                </label>
                <!-- Campo de entrada de texto para la tarea -->
                <input class="form-input" 
                type="text"
                id="todo"
                name="to-do"
                size="30"
                autocomplete="off"
                required>
                <!-- Botón para enviar el formulario -->
                <button class="button">
                    <!-- Texto dentro del botón -->
                    <span>submit</span>
                </button>
            </div>
        </form>
        <!-- Lista de tareas por hacer -->
        <div>
            <ul class="toDoList">

            </ul>
        </div>
    </section>
    <!-- Enlace al archivo JavaScript que proporciona la funcionalidad -->
    <script src="script.js"></script>
</body>
</html>
