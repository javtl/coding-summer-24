<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">

</head>
<body>
    <div class="container">
        <h1 class="line1">Generate a</h1>
        <h1 class="line2">Random Password</h1>
