<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Definición de la codificación de caracteres y la escala inicial -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <!-- Enlace a la hoja de estilos externa y al ícono de la pestaña del navegador -->
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="img/icons8-cards-55.png">
</head>
<body>
    
    <!-- Contenedor principal de la aplicación -->
    <div id="app">
        <!-- Tarjeta de crédito -->
        <div class="card">
            <!-- Titular de la tarjeta -->
            <div class="holder">Nombre Apellidos</div>
            <!-- Campos de entrada para el número de tarjeta, fecha de vencimiento y CVV -->

            <input type="text" id="inputDate"/>
            <input type="text" id="inputCVV"/>
        </div>
    </div>

    <!-- Inclusión del archivo de script JavaScript -->
    <script src="script.js"></script>

</body>
</html>
